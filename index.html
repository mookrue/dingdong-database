<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>叮咚！歡迎光臨資料庫｜政大圖書館</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#23281F;--ink2:#4C5344;--paper:#EAE7DC;--card:#FBFAF4;--line:#CFcBBb;--muted:#83806F;
  --red:#D23B2E;--green:#0E7A3D;--accent:#0E7A3D;
  --receipt:#FBFAF4;
  --shadow:0 1px 0 rgba(35,40,31,.04),0 6px 18px rgba(35,40,31,.06);
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--paper);
  background-image:radial-gradient(circle at 1px 1px, rgba(35,40,31,.05) 1px, transparent 0);
  background-size:22px 22px;
  color:var(--ink);font-family:"Noto Sans TC",system-ui,sans-serif;font-size:16px;line-height:1.8;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 100px}

.bar{position:sticky;top:0;z-index:30;background:#fff;color:var(--ink);margin:0 -20px 30px;padding:10px 20px 13px;display:flex;gap:12px;align-items:center;justify-content:space-between;font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.04em;font-weight:600;box-shadow:0 4px 14px rgba(30,42,51,.06)}
.bar::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:6px;
  background:radial-gradient(circle at 6px -1px, transparent 6px, #fff 6px);
  background-size:12px 6px}
.stripes{height:7px;border-radius:4px;margin:0 0 18px;
  background:linear-gradient(90deg,#00A44E 0 25%,#0072CE 25% 50%,#F58220 50% 75%,#E03C31 75% 100%)}
.stripes--thin{height:5px;margin:22px 0 14px}
.stickers{display:flex;gap:6px;align-items:center}

.sticker{position:relative;width:27px;height:27px;border-radius:50%;border:2px dashed var(--line);display:grid;place-items:center;font-size:11px;font-weight:700;color:#AEB9B3;background:#fff;transition:.2s}
.sticker::after{content:"";position:absolute;inset:3px;border-radius:50%;border:1px dotted transparent}
.sticker.got::after{border-color:rgba(255,255,255,.55)}
.sticker.now{border-style:solid;border-color:var(--ink);color:var(--ink)}
.sticker.got{border:2px solid #fff;color:#fff;font-weight:800;box-shadow:0 2px 6px rgba(30,42,51,.25);animation:stamp .45s cubic-bezier(.3,1.6,.5,1)}
@keyframes stamp{0%{transform:scale(2.2) rotate(-14deg);opacity:0}60%{transform:scale(.92) rotate(4deg);opacity:1}100%{transform:none}}
.bar b{color:var(--ink);font-weight:700}

h1{font-size:clamp(36px,8vw,64px);font-weight:900;line-height:1.06;letter-spacing:-.03em;margin:26px 0 6px}
.sub{font-size:clamp(16px,3vw,20px);font-weight:700;color:var(--muted);margin:0 0 16px}
h2{font-size:clamp(23px,4.4vw,32px);font-weight:900;line-height:1.24;letter-spacing:-.02em;margin:0 0 8px}
.eyebrow{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;background:transparent;color:var(--ink);border:1px dashed var(--ink);padding:3px 12px;border-radius:2px;margin-bottom:12px}
.lede{font-size:17px;color:var(--ink2);max-width:60ch}
.hint{font-size:13.5px;color:var(--muted);margin-top:10px}
hr.rule{border:0;border-top:2px dotted var(--line);margin:36px 0}

.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:22px;margin:20px 0;box-shadow:var(--shadow)}
.card--a{border-top:none}
.card--a::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;border-radius:4px 4px 0 0;
  background:repeating-linear-gradient(90deg,var(--accent) 0 10px,transparent 10px 16px)}
.src{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--muted);letter-spacing:.05em;display:block;margin-bottom:12px;text-transform:uppercase}

.thesis{background:#123B2A;color:#EAF5EF;border-radius:14px;padding:22px;margin:22px 0;font-size:clamp(17px,3.2vw,22px);font-weight:500;line-height:1.65;min-height:104px;display:flex;align-items:center}
.slot{border-bottom:2px dashed #4E7A64;padding:0 7px;margin:0 2px;color:#8FBFA5;transition:.3s}
.slot.filled{color:#123B2A;background:#F5A800;border-bottom-color:#F5A800;border-radius:4px;animation:pop .36s cubic-bezier(.3,1.5,.5,1)}
@keyframes pop{0%{opacity:.2;transform:translateY(4px) scale(.94)}100%{opacity:1;transform:none}}

.opts{display:grid;gap:11px;margin-top:16px}
.opt{text-align:left;font:inherit;color:inherit;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:3px;padding:14px 16px;cursor:pointer;display:flex;gap:13px;align-items:flex-start;transition:.12s}
.opt:hover{border-left-color:var(--ink);background:#fff}
.opt:disabled{cursor:default}
.k{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;flex:none;margin-top:1px;width:26px;height:26px;border-radius:3px;display:grid;place-items:center;background:#E4E1D4;color:var(--ink2)}
.opt.good{border-color:var(--green);background:#EBFAF4}.opt.good .k{background:var(--green);color:#fff}
.opt.bad{border-color:var(--red);background:#FEEFF3}.opt.bad .k{background:var(--red);color:#fff}
.opt.warn{border-color:#E39A16;background:#FFF7E6}.opt.warn .k{background:#E39A16;color:#fff}
.opt.on{border-color:var(--ink);background:#EDF4EF}.opt.on .k{background:var(--ink);color:#fff}

.exp{display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-bottom:1px dotted var(--line)}
.exp:last-child{border-bottom:0;padding-bottom:0}
.exp .k{margin-top:2px}.exp .body{font-size:15px}
.exp .quo{display:block;font-weight:700;margin-bottom:3px;line-height:1.55}
.verdict{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;letter-spacing:.06em;padding:2px 8px;border-radius:20px;margin-left:7px;white-space:nowrap;vertical-align:2px}
.v-ok{background:var(--green);color:#fff}.v-no{background:var(--red);color:#fff}.v-warn{background:#E39A16;color:#fff}

.need{border:1.5px solid var(--ink);border-radius:12px;padding:15px 17px;background:var(--card);box-shadow:-3px 4px 0 var(--ink)}
.fams{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:16px}
.fam{text-align:left;font:inherit;color:inherit;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;transition:.15s}
.fam:hover{border-color:var(--ink);transform:translateY(-3px);box-shadow:0 4px 0 var(--ink)}
.fam:disabled{cursor:default;transform:none;box-shadow:none;opacity:.42}
.fam strong{display:block;font-size:14.5px;font-weight:700}
.fam span{display:block;font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.fam.good{border-color:var(--green);background:#EBFAF4;opacity:1}
.fam.bad{border-color:var(--red);background:#FEEFF3;opacity:1}

.offgrid{background:#123B2A;color:#EAF5EF;border-radius:12px;padding:16px 18px;margin-top:14px;font-size:15px;line-height:1.8}
.offgrid .lb{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;letter-spacing:.1em;background:#F5A800;color:#123B2A;padding:2px 9px;border-radius:20px;margin-bottom:8px}

/* 檢索式 */
.query{background:#123B2A;color:#C9EFD8;border-radius:12px;padding:16px 18px;min-height:78px;font-family:"IBM Plex Mono",monospace;font-size:14.5px;line-height:2.1;word-break:break-word;margin:16px 0}
.query .ph{color:#5E8A72}
.query .tk{background:#1E5A41;padding:2px 8px;border-radius:4px;margin:0 3px;display:inline-block}
.query .tk.op{background:transparent;color:#F5A800;font-weight:600}
.chipset h4{margin:16px 0 7px;font-size:11.5px;font-family:"IBM Plex Mono",monospace;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font:inherit;font-size:14px;background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:5px 14px;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--ink);background:#fff;transform:translateY(-2px)}
.chip.op{border-radius:6px;font-family:"IBM Plex Mono",monospace;font-weight:600;color:var(--ink)}
.rule-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px dotted var(--line);font-size:14.5px}
.rule-row:last-child{border-bottom:0}
.rule-row .mk{font-family:"IBM Plex Mono",monospace;font-weight:700;flex:none;width:22px;font-size:16px}
.rule-row.hit .mk{color:var(--green)}.rule-row.no .mk{color:var(--red)}
.rule-row small{display:block;color:var(--muted);font-size:13px;line-height:1.7}

/* 文獻卡 */
.papers{display:grid;gap:11px;margin-top:16px}
.paper{text-align:left;font:inherit;color:inherit;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:15px 17px;cursor:pointer;transition:.15s}
.paper:hover{border-color:var(--ink);transform:translate(2px,-2px);box-shadow:-2px 3px 0 var(--ink)}
.paper:disabled{cursor:default;transform:none;box-shadow:none}
.paper .ti{font-weight:700;font-size:15.5px;line-height:1.5;display:block}
.paper .au{font-size:13.5px;color:var(--ink2);display:block;margin-top:3px}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.meta span{font-family:"IBM Plex Mono",monospace;font-size:11.5px;background:#E8EEEA;color:var(--ink2);border-radius:20px;padding:2px 9px}
.meta .hot{background:var(--ink);color:#fff}
.paper.on{border-color:var(--ink);background:#EDF4EF}
.paper.good{border-color:var(--green);background:#EBFAF4}
.paper.bad{border-color:var(--red);background:#FEEFF3}
.paper.warn{border-color:#E39A16;background:#FFF7E6}

/* 資源檔案卡 */
.prof{background:var(--card);border:1.5px solid var(--line);border-top:5px solid var(--fc,var(--accent));border-radius:12px;padding:18px 20px;margin-top:16px;box-shadow:var(--shadow)}
.prof-h{display:flex;gap:12px;align-items:center;padding-bottom:13px;margin-bottom:4px;border-bottom:2px dotted var(--line)}
.prof-i{width:38px;height:38px;flex:none;border-radius:10px;background:var(--fc,var(--accent));color:#fff;display:grid;place-items:center;font-weight:900;font-size:18px}
.prof-h b{display:block;font-size:17px;font-weight:900;line-height:1.35}
.prof-h small{display:block;font-size:12.5px;color:var(--muted);font-family:"IBM Plex Mono",monospace}
.prof-r{padding:11px 0;border-bottom:1px dotted var(--line);font-size:14.5px;color:var(--ink2);line-height:1.8}
.prof-r:last-child{border-bottom:0;padding-bottom:0}
.prof-r .lb{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:2px;letter-spacing:.02em}
.profs{display:grid;gap:14px;margin-top:18px}

/* 大張集點卡 */
.loyalty{background:var(--receipt);border:1px solid var(--line);border-radius:6px;padding:0;margin-top:20px;box-shadow:var(--shadow);overflow:hidden}
.loyalty-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:16px 18px 14px;background:#123B2A;color:#EAF5EF}
.loyalty-brand{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:14px;letter-spacing:.06em}
.loyalty-sub{font-size:12.5px;color:#9FC4AF;margin-top:3px}
.loyalty-no{font-family:"IBM Plex Mono",monospace;font-size:10px;color:#9FC4AF;text-align:right;line-height:1.5;letter-spacing:.05em}
.loyalty-no b{color:#F5A800;font-size:15px}
.loyalty-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:4px;background:
  repeating-linear-gradient(0deg,transparent 0 33.33%,var(--line) 33.33% calc(33.33% + 1px)),
  repeating-linear-gradient(90deg,transparent 0 25%,var(--line) 25% calc(25% + 1px))}
@media(min-width:600px){.loyalty-grid{grid-template-columns:repeat(4,1fr)}}
.cell{position:relative;aspect-ratio:1.15;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:var(--receipt);margin:0}
.cell-nm{font-size:10.5px;color:var(--muted);font-weight:600;text-align:center;line-height:1.25;padding:0 4px}
.ink-empty{width:38px;height:38px;border-radius:50%;border:2px dashed var(--line);display:grid;place-items:center;font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:15px;color:#BFBBAB}
.ink{position:relative;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
  color:var(--c);border:2.5px solid var(--c);
  animation:drop .5s cubic-bezier(.2,1.5,.4,1) both}
.ink::before{content:"";position:absolute;inset:3px;border-radius:50%;border:1px solid var(--c);opacity:.5}
.ink b{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:18px;line-height:1}
.ink i{font-style:normal;font-size:8px;font-weight:700;letter-spacing:.05em}
.ink b,.ink i{display:block;text-align:center}
@keyframes drop{0%{transform:scale(2.4) rotate(-18deg);opacity:0}55%{transform:scale(.9) rotate(5deg);opacity:1}100%{transform:none}}
.cell.reward .ink-reward{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:22px;border:2px dashed var(--line);background:#fff}
.cell.reward.win .ink-reward{border:2.5px solid #F5A800;background:#FFF6DF;animation:drop .5s cubic-bezier(.2,1.5,.4,1) both}
.cell.reward.win .cell-nm{color:#B8860B;font-weight:800}
.loyalty-foot{display:flex;justify-content:space-between;align-items:center;padding:11px 18px;border-top:1px dashed var(--line);font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--muted);letter-spacing:.04em}
.gift{background:#123B2A;color:#EAF5EF;border-radius:16px;padding:22px;margin-top:20px}
.gift .tag{display:inline-block;background:#F5A800;color:#123B2A;font-weight:800;font-size:12px;letter-spacing:.1em;padding:3px 11px;border-radius:20px;margin-bottom:10px;font-family:"IBM Plex Mono",monospace}
.gift h3{margin:0 0 10px;font-size:25px;font-weight:900;line-height:1.25}
.gift p{margin:0 0 10px;font-size:15px;line-height:1.85;color:#CFE6DA}
.gift p:last-child{margin-bottom:0}
.gift b{color:#fff}
.gift .rx{background:rgba(255,255,255,.07);border-left:3px solid #F5A800;border-radius:0 8px 8px 0;padding:13px 15px;margin-top:12px}
.cta{display:block;text-align:center;text-decoration:none;background:#E03C31;color:#fff;font-weight:900;font-size:19px;padding:18px 24px;border-radius:14px;box-shadow:0 5px 0 #A82A22;margin:22px 0 6px;transition:.15s}
.cta:hover{transform:translateY(-2px);box-shadow:0 7px 0 #A82A22}
.cta small{display:block;font-size:13px;font-weight:500;opacity:.92;margin-top:4px}

/* 工具介紹卡 */
.tool{background:#F3F7FF;border:2px solid #3D6BD6;border-radius:14px;padding:18px 20px;margin-top:16px}
.tool .lb{display:block;font-weight:900;font-size:16px;margin-bottom:8px;color:#1F3F8F}
.tool p{margin:0 0 10px;font-size:15px;color:var(--ink2);line-height:1.85}
.tool p:last-child{margin-bottom:0}
.tool .warn-h{display:block;font-weight:900;color:#B23A2E;margin:14px 0 6px;font-size:15.5px}
.tool ol{margin:8px 0 0;padding-left:1.3em;font-size:15px;color:var(--ink2)}
.tool ol li{margin-bottom:7px}
.tool ol li b{color:var(--ink)}

/* 彩蛋 */
.egg{background:#FFF9EA;border:2px dashed #F5A800;border-radius:14px;padding:17px 19px;margin-top:16px}
.egg .lb{display:block;font-weight:900;font-size:15.5px;margin-bottom:6px}
.egg p{margin:0 0 8px;font-size:15px;color:var(--ink2);line-height:1.85}
.egg p:last-child{margin-bottom:0}
.egg .go{font-weight:700;color:var(--ink)}

.orig{background:#FAFCFB;border:1.5px solid var(--line);border-left:5px solid var(--muted);border-radius:0 12px 12px 0;padding:18px 20px;font-size:15.5px;line-height:2}
.stmt{display:block;width:100%;text-align:left;font:inherit;color:inherit;border:0;border-bottom:1.5px solid transparent;background:linear-gradient(var(--accent),var(--accent)) no-repeat left center;background-size:0% 90%;padding:9px 7px;margin:3px -7px;cursor:pointer;border-radius:4px;transition:background-size .4s cubic-bezier(.4,.9,.3,1)}
.stmt:hover{border-bottom-color:var(--line)}
.stmt.marked{background-size:100% 90%}
.stmt:disabled{cursor:default}
.stmt.miss{background-image:linear-gradient(#FBD3DF,#FBD3DF);text-decoration:line-through;text-decoration-color:var(--red)}
.stmt.missed{background-image:linear-gradient(#CFEEE2,#CFEEE2);background-size:100% 90%}

.fb{background:var(--card);border:1.5px solid var(--line);border-left:6px solid var(--accent);border-radius:0 12px 12px 0;padding:17px 19px;margin-top:20px;box-shadow:var(--shadow)}
.fb.good{border-left-color:var(--green)}.fb.bad{border-left-color:var(--red)}
.fb p{margin:0 0 9px;font-size:15px;color:var(--ink2)}.fb p:last-child{margin-bottom:0}
.lesson{font-family:"IBM Plex Mono",monospace;font-size:11.5px;font-weight:600;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}

.links{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.links a{background:#fff;border:1.5px solid var(--ink);border-radius:20px;padding:6px 15px;font-size:14px;font-weight:500;text-decoration:none;color:var(--ink);transition:.15s}
.links a:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-2px)}
.links-t{font-family:"IBM Plex Mono",monospace;font-size:11.5px;font-weight:600;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;margin-top:22px}

.btn{font:inherit;font-weight:700;letter-spacing:.02em;background:var(--ink);color:var(--receipt);border:0;border-radius:4px;padding:13px 26px;cursor:pointer;margin-top:22px;transition:.12s;position:relative}
.btn::after{content:"";position:absolute;inset:3px;border:1px solid rgba(251,250,244,.35);border-radius:2px;pointer-events:none}
.btn:hover{background:#0E7A3D}
.btn:active{transform:translateY(1px)}
.btn[disabled]{background:var(--line);color:#9A9686;cursor:not-allowed}
.btn[disabled]::after{display:none}
.btn--ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}

.stamp{display:inline-block;background:var(--accent);color:#fff;font-weight:900;font-size:25px;padding:10px 26px;border-radius:14px;transform:rotate(-2.5deg);margin:10px 0 22px}
.score{font-family:"IBM Plex Mono",monospace;font-size:58px;font-weight:600;line-height:1}
.score small{font-size:16px;color:var(--muted)}
.list{padding-left:1.2em;color:var(--ink2);font-size:15px}
.ai-good{display:flex;flex-direction:column;gap:2px;margin:16px 0 0}
.ai-row{display:flex;gap:13px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--green);border-radius:3px;padding:14px 16px;margin-bottom:8px;font-size:14.5px;line-height:1.75;color:var(--ink2)}
.ai-row b{color:var(--ink)}
.ai-ic{flex:none;font-size:20px;margin-top:1px}
.list li{margin-bottom:8px}
.note{background:#FFF9EA;border:1.5px dashed #E3B65C;border-radius:12px;padding:13px 15px;font-size:13.5px;color:#7A5A12;margin-top:16px}
.tally{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.tally span{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:5px 13px;font-size:13.5px;font-weight:500}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
</style>

<div class="bar">
  <span>集點卡</span>
  <span class="stickers" id="stk"></span>
  <span><b id="scoreBar">0</b>／140</span>
</div>

<div class="wrap"><div id="screen"></div></div>

<script>
const HUE=["#00A44E","#F58220","#E03C31","#0072CE","#009E9E","#F5A800","#3A4CA8"];

/* ========== 圖書館連結 ========== */
const LK={
  course:{t:"📅 資料庫講習課程",u:"https://www.lib.nccu.edu.tw/p/404-1000-297.php?Lang=zh-tw"},
  elearn:{t:"🎬 e 學習網（資料庫教學影片）",u:"https://lib.video.nccu.edu.tw/p/online"},
  ebook: {t:"📱 電子書資源介紹",u:"https://lib.video.nccu.edu.tw/p/online#ebook"},
  review:{t:"📚 文獻回顧大小事與資料庫應用指南（影片）",u:"https://lib.video.nccu.edu.tw/media/452"},

/* ================= 01 定題 ================= */
function renderL1(){
  const L=L1;let r=0,pts=0;const ch=[];
  // 題目行始終填入「正解」，讓收斂後的研究問題與後續關卡一致
  const best=R=>R.opts.find(o=>o.v==="ok");
  el.innerHTML=head(L)+`<div class="thesis" id="th"></div><div id="body"></div>`;
  draw();step();
  function draw(){
    const s=i=>ch[i]?`<span class="slot filled">${ch[i]}</span>`:`<span class="slot">？</span>`;
    document.getElementById("th").innerHTML=
      `<div>${L.tpl[0]} ${s(0)} ${L.tpl[1]} ${s(1)} ${L.tpl[2]} ${s(2)} ${L.tpl[3]} ${s(3)} ${L.tpl[4]}</div>`;
  }
  function step(){
    if(r>=L.rounds.length){
      const g=Math.round(pts/(L.rounds.length*2)*20);add(g);
      document.getElementById("body").innerHTML=
        `<div class="card card--a"><span class="src">✅ 收斂後可以動工的研究題目</span><p style="margin:0;font-size:18px;font-weight:700;line-height:1.7">${
          L.tpl[0]+ch[0]+L.tpl[1]+ch[1]+L.tpl[2]+ch[2]+L.tpl[3]+ch[3]+L.tpl[4]}</p>
          <p style="margin:10px 0 0;font-size:13.5px;color:var(--muted)">（不論剛剛選了什麼，我們都以最能做得完的版本往下走，後面幾關都會用這個題目～）</p></div>`
        +debrief(L,g,0)+`<button class="btn" onclick="next()">拿著題目去找資料 →</button>`;
      return;
    }
    const R=L.rounds[r];
    document.getElementById("body").innerHTML=`
      <div class="card"><span class="src">收斂 ${r+1} / ${L.rounds.length}</span>
        <p style="margin:0;font-size:17px;font-weight:500">${R.ask}</p>
        <div class="opts" id="o">${R.opts.map((o,i)=>
          `<button class="opt" data-i="${i}"><span class="k">${AB[i]}</span><span>${o.frag}${o.pair?" ／ "+o.pair:""}</span></button>`).join("")}</div>
      </div><div id="fb"></div>`;
    document.querySelectorAll("#o .opt").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.i,o=R.opts[i];
      document.querySelectorAll("#o .opt").forEach((x,j)=>{
        x.disabled=true;x.classList.add(R.opts[j].v==="ok"?"good":R.opts[j].v==="warn"?"warn":"bad");});
      pts+=o.v==="ok"?2:o.v==="warn"?1:0;
      // 題目行一律填入正解，與第 3 關的檢索題保持一致
      const bo=best(R);
      if(r===0)ch[0]=bo.frag;else if(r===1){ch[1]=bo.frag;ch[2]=bo.pair;}else ch[3]=bo.frag;
      draw();
      const note = o.v==="ok"
        ? ""
        : `<p style="margin:0 0 6px;font-size:14px;color:var(--ink2)">📝 你選了 <b>${AB[i]}</b>，不過為了讓這份報告做得完，我們把題目行填成最能動工的版本（選項 ${AB[R.opts.indexOf(bo)]}），一起往下看看為什麼～</p>`;
      document.getElementById("fb").innerHTML=
        note+explain(R.opts.map(x=>({t:x.frag+(x.pair?" ／ "+x.pair:""),v:x.v,why:x.why})),AB,`🤔 逐一看看每個選項`)
        +`<button class="btn" id="nx">${r+1<L.rounds.length?"繼續縮小 →":"看看題目變成什麼樣子 →"}</button>`;
      document.getElementById("nx").onclick=()=>{r++;step();};
    });
  }
}

/* ================= 03 關鍵字 ================= */
function renderL3(){
  const L=L3;const q=[];
  el.innerHTML=head(L)+`
    <div class="query" id="q"><span class="ph">點下面的詞彙磚開始組合⋯⋯</span></div>
    <button class="btn btn--ghost" style="padding:8px 18px;font-size:14px;margin-top:0" id="undo">退一格</button>
    <button class="btn btn--ghost" style="padding:8px 18px;font-size:14px;margin-top:0" id="clr">清空</button>
    <div class="chipset">${Object.entries(L.chips).map(([k,v])=>
      `<h4>${k}</h4><div class="chips">${v.map((c,i)=>
        `<button class="chip ${c.g==="op"?"op":""}" data-t="${c.t.replace(/"/g,'&quot;')}" data-g="${c.g}" data-zh="${!!c.zh}" data-ac="${!!c.academic}">${c.t}</button>`).join("")}</div>`).join("")}
    </div>
    <button class="btn" id="go" disabled>檢查這組檢索式</button><div id="fb"></div>`;
  const draw=()=>{
    document.getElementById("q").innerHTML=q.length
      ? q.map(t=>`<span class="tk ${t.g==="op"?"op":""}">${t.t}</span>`).join("")
      : `<span class="ph">點下面的詞彙磚開始組合⋯⋯</span>`;
    document.getElementById("go").disabled=q.length<3;
  };
  document.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    q.push({t:b.dataset.t,g:b.dataset.g,zh:b.dataset.zh==="true",ac:b.dataset.ac==="true"});draw();});
  document.getElementById("undo").onclick=()=>{q.pop();draw();};
  document.getElementById("clr").onclick=()=>{q.length=0;draw();};
  document.getElementById("go").onclick=()=>{
    const cnt=g=>q.filter(t=>t.g===g).length;
    const op=s=>q.some(t=>t.g==="op"&&t.t===s);
    const res={
      aca: q.some(t=>t.g==="A"&&t.ac&&t.zh),
      syn: cnt("A")>=2||cnt("B")>=2||cnt("C")>=2,
      bi:  q.some(t=>t.zh&&t.g!=="op")&&q.some(t=>!t.zh&&t.g!=="op"),
      or:  op("OR"), and: op("AND"), par: op("(")&&op(")")
    };
    const hit=Object.values(res).filter(Boolean).length;
    const g=Math.round(hit/6*20);add(g);
    document.getElementById("go").remove();
    document.getElementById("fb").innerHTML=
      `<div class="card"><span class="src">檢查結果 ${hit} / 6</span>`+
      L.rules.map(r=>`<div class="rule-row ${res[r.id]?"hit":"no"}"><span class="mk">${res[r.id]?"✓":"✕"}</span>
        <span><b>${r.label}</b><small>${r.desc}</small></span></div>`).join("")+`</div>`
      +debrief(L,g,2)+`<button class="btn" onclick="next()">拿檢索式去查文獻 →</button>`;
  };
}

function renderL4(){
  const L=L4;const picked=new Set();
  el.innerHTML=head(L)+`

    <div class="papers" id="p">${L.papers.map((p,i)=>
      `<button class="paper" data-i="${i}"><span class="ti">${p.ti}</span><span class="au">${p.au}</span>
        <span class="meta">${p.meta.map((m,j)=>`<span class="${p.hot&&j===1?"hot":""}">${m}</span>`).join("")}</span></button>`).join("")}
    </div>
    <p class="hint" id="cnt">已選 0 篇 · 請選 3 篇</p>
    <button class="btn" id="go" disabled>就讀這幾篇</button><div id="fb"></div>`;
  const go=document.getElementById("go");
  document.querySelectorAll(".paper").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i;
    picked.has(i)?(picked.delete(i),b.classList.remove("on")):(picked.add(i),b.classList.add("on"));
    document.getElementById("cnt").textContent=`已選 ${picked.size} 篇 · 請選 3 篇`;
    go.disabled=picked.size===0;});
  go.onclick=()=>{
    let hit=0,soft=0,miss=0;
    document.querySelectorAll(".paper").forEach(b=>{
      const i=+b.dataset.i,p=L.papers[i];b.disabled=true;b.classList.remove("on");
      b.classList.add(p.v==="ok"?"good":p.v==="no"?"bad":"warn");
      if(picked.has(i)&&p.v==="ok")hit++;
      else if(picked.has(i)&&p.v==="warn")soft++;
      else if(picked.has(i)&&p.v==="no")miss++;});
    const total=L.papers.filter(x=>x.v==="ok").length;
    const g=Math.max(0,Math.round((hit+soft*.5-miss*.5)/total*20));add(g);go.remove();
    document.getElementById("fb").innerHTML=
      explain(L.papers.map(p=>({t:p.ti,v:p.v,why:p.why})),AB,
        `🤔 你選了 ${[...picked].sort().map(i=>AB[i]).join("、")||"（沒有選）"}，一起看看每一篇`)
      +debrief(L,g,3)+`<button class="btn" onclick="next()">開始查證 →</button>`;
  };
}

      document.getElementById("body").innerHTML=debrief(L,g,4)+`<button class="btn" onclick="next()">開始讀文獻 →</button>`;

      <div class="card"><span class="src">${S.q}</span>
        <div class="opts" id="o">${S.opts.map((o,i)=>

      </div><div id="fb"></div>`;
    document.querySelectorAll("#o .opt").forEach(b=>b.onclick=()=>{

      pts+=o.v==="ok"?10:o.v==="warn"?6:2;

        explain(S.opts,AB,`🤔 你選了 ${AB[i]}，一起看看每個選項`)

function renderL6(){
  const L=L6;const picked=new Set();
  el.innerHTML=head(L)+`
    <div class="card"><span class="src">📄 原文摘要</span>
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 12px;line-height:1.7">${L.cite}</p>

    <div class="card card--a"><span class="src">🤖 AI 生成的摘要 · 點句子就能劃線</span><div id="st"></div></div>
    <p class="hint" id="cnt">已劃 0 句 · ${L.need}</p>
    <button class="btn" id="go" disabled>提交</button><div id="out"></div>`;
  const box=document.getElementById("st");
  box.innerHTML=L.items.map((it,i)=>`<button class="stmt" data-i="${i}"><b style="font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-right:8px">${AB[i]}</b>${it.t}</button>`).join("");
  const go=document.getElementById("go");
  box.querySelectorAll(".stmt").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i;
    picked.has(i)?(picked.delete(i),b.classList.remove("marked")):(picked.add(i),b.classList.add("marked"));
    document.getElementById("cnt").textContent=`已劃 ${picked.size} 句 · ${L.need}`;
    go.disabled=picked.size===0;});
  go.onclick=()=>{
    let hit=0,miss=0;
    box.querySelectorAll(".stmt").forEach(b=>{
      const i=+b.dataset.i,it=L.items[i];b.disabled=true;b.classList.remove("marked");
      if(picked.has(i)&&it.bad){b.classList.add("marked");hit++;}
      else if(picked.has(i)&&!it.bad){b.classList.add("miss","marked");miss++;}
      else if(!picked.has(i)&&it.bad){b.classList.add("missed");}});
    const bad=L.items.filter(x=>x.bad).length;
    const g=Math.max(0,Math.round((hit-miss*.5)/bad*20));add(g);go.remove();
    document.getElementById("out").innerHTML=
      explain(L.items,AB,`🤔 你劃了 ${[...picked].sort().map(i=>AB[i]).join("、")||"（沒有劃）"}，一起逐句對照`)
      +debrief(L,g,5)+`<button class="btn" onclick="next()">準備收尾 →</button>`;
  };
}
